services:
  dream-league-api:
    build:
      context: .
      target: development
    environment:
      POSTGRES_HOST: dream-league-api-postgres
    ports:
      - "3001:3001"
      - "9230:9229"
    command: >
      sh -c "
        npm run migrate &&
        npm run seed &&
        npm run start:watch"
    volumes:
      - ./app:/home/node/app
      - ./package.json:/home/node/package.json
      - ./test:/home/node/test
      - ./test-output:/home/node/test-output
    networks:
      - dream-league
    depends_on:
      dream-league-api-postgres:
        condition: service_healthy
      dream-league-api-redis:
        condition: service_started

  dream-league-api-postgres:
    extends:
      file: compose.yaml
      service: dream-league-api-postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - dream-league

  dream-league-api-redis:
    extends:
      file: compose.yaml
      service: dream-league-api-redis
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    networks:
      - dream-league

volumes:
  postgres_data:
  redis_data:

networks:
  dream-league:
    driver: bridge
    name: dream-league
