services:
  dream-league-api:
    profiles:
      - app
    build:
      context: .
      target: development
    ports:
      - '3001:3001'
      - '9230:9229'
    volumes:
      - ./app:/home/node/app
      - ./package.json:/home/node/package.json
    env_file:
      - .env
    environment:
      POSTGRES_HOST: dream-league-api-postgres
      REDIS_HOST: dream-league-api-redis
      WEB_URL: http://dream-league-web:3000
    command: >
      sh -c "
        npm run migrate &&
        npm run seed &&
        node app"
    depends_on:
      dream-league-api-postgres:
        condition: service_healthy
      dream-league-api-redis:
        condition: service_healthy
    networks:
      - dream-league

  dream-league-api-postgres:
    image: postgres:17-alpine
    container_name: dream-league-api-postgres
    environment:
      POSTGRES_DB: dream_league_api
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - dream-league
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER} -d dream_league_api']
      interval: 10s
      retries: 5
      start_period: 1s
      timeout: 10s

  dream-league-api-redis:
    image: redis:7-alpine
    container_name: dream-league-api-redis
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    command: redis-server --dir /data --save 5 1 --requirepass ${REDIS_PASSWORD}
    networks:
      - dream-league
    healthcheck:
      test: ['CMD', 'redis-cli', '-a', '${REDIS_PASSWORD}', 'ping']
      interval: 10s
      timeout: 3s
      retries: 5

volumes:
  postgres_data:
  redis_data:

networks:
  dream-league:
    driver: bridge
    name: dream-league
